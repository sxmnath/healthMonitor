<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <title>healthMonitor — Ward Overview</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="style.css" />
  <script src="/socket.io/socket.io.js"></script>
</head>
<body>
  <div class="app-layout">

    <!-- ── Sidebar ──────────────────────────────────────── -->
    <aside class="sidebar" id="wardSidebar">
      <div class="sidebar-logo">
        <button class="sidebar-collapse-btn" id="wardSidebarToggle" title="Collapse sidebar">
          <i class="fa-solid fa-heart-pulse logo-icon"></i>
          <span class="logo-text">healthMonitor</span>
          <i class="fa-solid fa-chevron-left collapse-arrow"></i>
        </button>
        <span class="sidebar-tagline">Real-time patient monitoring</span>
      </div>
      <nav class="sidebar-nav">
        <a href="/" class="nav-item active" title="Ward Overview">
          <i class="fa-solid fa-building-columns"></i>
          <span>Ward Overview</span>
        </a>
        <a href="/profile" class="nav-item" title="My Profile">
          <i class="fa-solid fa-circle-user"></i>
          <span>My Profile</span>
        </a>
        <a href="/admin" class="nav-item" id="adminNavLink"
           style="display:none" title="Admin Panel">
          <i class="fa-solid fa-shield-halved"></i>
          <span>Admin Panel</span>
        </a>
      </nav>
      <div class="sidebar-bottom">
        <button class="nav-item logout-btn" onclick="logout()" title="Logout">
          <i class="fa-solid fa-arrow-right-from-bracket"></i>
          <span>Logout</span>
        </button>
      </div>
    </aside>

    <!-- ── Main ─────────────────────────────────────────── -->
    <main class="main-content">

      <!-- Topbar -->
      <div class="topbar">
        <div class="ward-title-row">
          <h1 class="ward-page-title">
            <i class="fa-solid fa-building-columns"></i>
            Ward Overview
          </h1>
          <div class="ward-filter-wrap">
            <i class="fa-solid fa-filter ward-filter-icon"></i>
            <select id="wardFilter" class="ward-filter-select"
                    onchange="onWardChange(this.value)">
              <option value="">All Wards</option>
              <option value="ICU">ICU</option>
              <option value="OPD">OPD</option>
              <option value="Ward A">Ward A</option>
              <option value="Ward B">Ward B</option>
            </select>
          </div>
        </div>
        <div class="topbar-meta">
          <div class="patient-count-pill">
            <i class="fa-solid fa-bed-pulse"></i>
            <span id="patientCount">0</span>&nbsp;patients
          </div>
          <span class="updated-time" id="wardUpdated">--</span>
          <div class="topbar-user">
            <span class="topbar-greeting">Hello, <strong id="topbarUserName">…</strong></span>
            <a href="/profile" class="topbar-avatar" id="topbarAvatar" title="View profile">
              <i class="fa-solid fa-user-doctor" id="topbarAvatarIcon"></i>
            </a>
          </div>
        </div>
      </div>

      <!-- Content area -->
      <div class="ward-content">

        <!-- Summary strip -->
        <div class="summary-strip" id="summaryStrip">
          <div class="summary-chip chip-critical">
            <i class="fa-solid fa-triangle-exclamation"></i>
            <span id="countCritical">0</span> Critical
          </div>
          <div class="summary-chip chip-warning">
            <i class="fa-solid fa-circle-exclamation"></i>
            <span id="countWarning">0</span> Warning
          </div>
          <div class="summary-chip chip-stable">
            <i class="fa-solid fa-circle-check"></i>
            <span id="countStable">0</span> Stable
          </div>
        </div>

        <!-- Patient grid -->
        <div id="patientGrid" class="patient-grid">
          <div class="loading-state">
            <i class="fa-solid fa-spinner fa-spin"></i>
            <p>Discovering patients…</p>
          </div>
        </div>

        <!-- Footer -->
        <footer class="ward-footer">
          <i class="fa-regular fa-clock"></i>
          <span id="wardFooterUpdated">Last updated: --</span>
        </footer>

      </div>
    </main>
  </div>

  <script src="hm-auth.js"></script>
  <script src="patients.js"></script>

  <script>
    // Reveal Admin Panel sidebar link for admins only — cosmetic, backend enforces
    (function() {
      try {
        var t = localStorage.getItem("hm_token");
        if (!t) return;
        var p = JSON.parse(atob(t.split(".")[1].replace(/-/g,"+").replace(/_/g,"/")));
        if (p.role === "admin") {
          var el = document.getElementById("adminNavLink");
          if (el) el.style.display = "";
        }
      } catch(_) {}
    })();
  </script>
</body>
</html>
